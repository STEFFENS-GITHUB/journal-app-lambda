name: Display-Get Lambda Build
on:
  push:
    branches:
    - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout git repository
      uses: actions/checkout@v6
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Build function zip
      run: zip latest.zip main.py

    - name: Build dependencies layer
      run: |
        pip install -r requirements.txt -t python
        zip -r layer.zip python

    - name: Upload to s3
      run: |
        aws s3 cp latest.zip s3://${{ vars.LAMBDA_BUCKET_NAME }}/latest.zip
        aws s3 cp layer.zip s3://${{ vars.LAMBDA_BUCKET_NAME }}/layer.zip

    - name: Publish dependencies layer
      id: publish-layer
      run: |
        LAYER_ARN=$(aws lambda publish-layer-version \
          --layer-name ${{ vars.LAMBDA_FUNCTION_NAME }}-deps \
          --content S3Bucket=${{ vars.LAMBDA_BUCKET_NAME }},S3Key=layer.zip \
          --compatible-runtimes python3.9 \
          --query 'LayerVersionArn' \
          --output text)
        echo "LAYER_ARN=$LAYER_ARN" >> $GITHUB_OUTPUT

    - name: Attach layer to Lambda
      run: |
        aws lambda update-function-configuration \
          --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
          --layers ${{ steps.publish-layer.outputs.LAYER_ARN }}

    - name: Wait for Lambda config update
      run: aws lambda wait function-updated --function-name ${{ vars.LAMBDA_FUNCTION_NAME }}

    - name: Update Lambda
      id: update-lambda
      run: |
        VERSION=$(aws lambda update-function-code \
          --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
          --s3-bucket ${{ vars.LAMBDA_BUCKET_NAME }} \
          --s3-key latest.zip \
          --publish \
          --query 'Version' \
          --output text)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Wait for Lambda update
      run: aws lambda wait function-updated --function-name ${{ vars.LAMBDA_FUNCTION_NAME }}

    - name: Update prod alias
      run: |
        aws lambda update-alias \
          --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
          --name prod \
          --function-version ${{ steps.update-lambda.outputs.VERSION }}
