name: Display-Get Lambda Build
on:
  push:
    branches:
    - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout git repository
      uses: actions/checkout@v6
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Build zip
      run: zip latest.zip main.py

    - name: Upload to s3
      run: aws s3 cp latest.zip s3://${{ vars.LAMBDA_BUCKET_NAME }}/latest.zip

    - name: Update Lambda
      id: update-lambda
      run: |
        echo "VERSION=$(aws lambda update-function-code \
          --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
          --s3-bucket ${{ vars.LAMBDA_BUCKET_NAME }} \
          --s3-key latest.zip \
          --publish \
          --query 'Version' \
          --output text)" >> $GITHUB_OUTPUT

    - name: Wait for Lambda update
      run: aws lambda wait function-updated --function-name ${{ vars.LAMBDA_FUNCTION_NAME }}

    - name: Update prod alias
      run: |
        aws lambda update-alias \
          --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
          --name prod \
          --function-version ${{ steps.update-lambda.outputs.VERSION }}
